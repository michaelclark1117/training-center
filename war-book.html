<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statement Recovery War Book | Harlow Payments Dallas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--blue:#1a3a6b;--accent:#2563eb;--accent-light:#dbeafe;
  --green-bg:#dcfce7;--green-txt:#166534;
  --amber-bg:#fef9c3;--amber-txt:#854d0e;
  --orange-bg:#fff7ed;--orange-txt:#9a3412;
  --red-bg:#fff1f2;--red-txt:#881337;
  --gray-bg:#f8fafc;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;--light:#94a3b8;
  --white:#fff;--row-alt:#f8fafc;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f1f5f9;color:var(--text);font-size:13px}

/* TOP BAR */
.topbar{background:var(--navy);color:#fff;padding:0 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 10px rgba(0,0,0,.3);height:52px}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{background:#1a9fe8;color:#fff;font-size:10px;font-weight:800;letter-spacing:.1em;padding:4px 8px;border-radius:4px}
.topbar-title{font-size:14px;font-weight:600;color:#fff}
.topbar-sub{font-size:11px;color:#93c5fd;margin-left:4px}
.topbar-count{font-size:11px;color:#93c5fd;margin-left:auto;white-space:nowrap}
.back-link{font-size:11px;color:#93c5fd;text-decoration:none;display:flex;align-items:center;gap:4px;margin-left:auto}
.back-link:hover{color:#fff}

/* SEARCH + FILTERS */
.controls{background:var(--blue);padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:2px solid var(--accent)}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:400px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:#93c5fd;fill:none;stroke-width:2;pointer-events:none}
#searchInput{width:100%;padding:8px 10px 8px 34px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:13px;outline:none}
#searchInput::placeholder{color:#93c5fd}
#searchInput:focus{border-color:#60a5fa;background:rgba(255,255,255,.15)}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#cbd5e1;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{background:rgba(255,255,255,.12);color:#fff}
.pill.active{background:#2563eb;border-color:#2563eb;color:#fff}
.count-badge{font-size:11px;color:#64748b;margin-left:auto;align-self:center;white-space:nowrap}

/* TABS */
.tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:0}
.tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--accent)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
.main{padding:16px 20px;max-width:1400px;margin:0 auto}

/* PROCESSOR CARDS */
.proc-list{display:flex;flex-direction:column;gap:6px}
.proc-card{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s,box-shadow .15s}
.proc-card:hover{border-color:#bfdbfe}
.proc-card.open{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.proc-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.proc-rank{font-size:10px;font-weight:700;color:var(--light);min-width:20px;text-align:right;flex-shrink:0}
.proc-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap}
.bt-Processor{background:#eff6ff;color:#1d4ed8}
.bt-ISO{background:#f0fdf4;color:#15803d}
.bt-Aggregator{background:#f5f3ff;color:#6d28d9}
.bt-POS{background:#fff7ed;color:#c2410c}
.bt-Gateway{background:#fef2f2;color:#b91c1c}
.bt-mPOS{background:#fdf4ff;color:#7e22ce}
.bt-Other{background:#f8fafc;color:#475569}
.bf-VH{background:#dcfce7;color:#166534}
.bf-High{background:#dbeafe;color:#1d4ed8}
.bf-Medium{background:#fef9c3;color:#854d0e}
.bf-Low{background:#f1f5f9;color:#475569}
.bv-yes{background:#dcfce7;color:#166534}
.bv-chk{background:#fef9c3;color:#854d0e}
.chev{width:14px;height:14px;stroke:var(--light);fill:none;stroke-width:2;flex-shrink:0;transition:transform .2s}
.open .chev{transform:rotate(180deg)}

/* EXPANDED */
.proc-detail{display:none;border-top:1px solid var(--border)}
.open .proc-detail{display:block}
.detail-inner{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-section{display:flex;flex-direction:column;gap:3px}
.dlabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--light)}
.dvalue{font-size:12px;color:var(--text);line-height:1.5}
.portal-link{color:var(--accent);text-decoration:none;font-size:12px;word-break:break-all}
.portal-link:hover{text-decoration:underline}
.copy-btn{padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:var(--white);color:var(--accent);font-size:10px;cursor:pointer;margin-left:6px;transition:all .1s;vertical-align:middle}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.full-row{grid-column:1/-1;border-radius:6px;padding:10px 12px}
.steps-row{background:#f8fafc}
.nologin-row{background:var(--orange-bg);border-left:3px solid #f97316}
.gotcha-row{background:var(--red-bg);border-left:3px solid #f43f5e}
.row-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.steps-row .row-label{color:var(--light)}
.nologin-row .row-label{color:#c2410c}
.gotcha-row .row-label{color:#9f1239}
.row-text{font-size:12px;line-height:1.7}
.steps-row .row-text{color:var(--text)}
.nologin-row .row-text{color:#7c2d12}
.gotcha-row .row-text{color:#881337}

/* DECODER TABLES */
.decoder-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.decoder-grid{display:grid;grid-template-columns:1fr 30px 1fr}
.dg-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--light);padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--border)}
.dg-cell{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border)}
.dg-row-alt .dg-cell{background:#f8fafc}
.dg-says{font-weight:600;color:var(--text)}
.dg-arrow{color:var(--light);text-align:center;font-size:14px;font-weight:700}
.dg-actual{color:var(--accent);font-weight:600}

/* QUICK REF */
.qref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px}
.qref-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;gap:10px}
.qref-num{font-size:11px;font-weight:700;color:var(--accent);min-width:22px;flex-shrink:0}
.qref-body{flex:1;min-width:0}
.qref-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.qref-url{font-size:11px;color:var(--accent);word-break:break-all;text-decoration:none;display:block}
.qref-phone{font-size:11px;color:var(--muted);margin-top:2px}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--text)}

@media(max-width:600px){
  .detail-inner{grid-template-columns:1fr}
  .full-row{grid-column:1}
  .badges .badge:nth-child(n+4){display:none}
}
</style>
</head>

let activeFilter='all', openCard=null, filtered=[...P];

function typeCls(t){
  const m={'Processor':'Processor','Gateway':'Gateway','Aggregator':'Aggregator','ISO':'ISO',
    'POS/Processor':'POS','POS':'POS','mPOS':'mPOS','Gateway/Aggregator':'Gateway'};
  return 'bt-'+(m[t]||'Other');
}
function freqCls(f){return 'bf-'+(f==='Very High'?'VH':f);}

function copy(txt,btn){
  navigator.clipboard.writeText(txt).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1400);});
}

function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  filtered=P.filter(p=>{
    const ms=!q||p.n.toLowerCase().includes(q)||p.t.toLowerCase().includes(q)||p.url.toLowerCase().includes(q);
    let mf=true;
    if(activeFilter==='all') mf=true;
    else if(activeFilter==='verified') mf=p.v;
    else if(['Very High','High','Medium','Low'].includes(activeFilter)) mf=p.f===activeFilter;
    else mf=p.t.includes(activeFilter);
    return ms&&mf;
  });
  document.getElementById('topCount').textContent=filtered.length+' of 75 processors';
  document.getElementById('countBadge').textContent=filtered.length+' shown';
  const list=document.getElementById('procList');
  if(!filtered.length){list.innerHTML='<div class="empty"><div class="empty-title">No processors match.</div><p style="margin-top:6px;font-size:13px">Clear the search or try a different filter.</p></div>';return;}
  list.innerHTML=filtered.map(p=>`
    <div class="proc-card" id="pc${p.r}">
      <div class="proc-header" onclick="toggle(${p.r})">
        <span class="proc-rank">${p.r}</span>
        <span class="proc-name">${p.n}</span>
        <div class="badges">
          <span class="badge ${typeCls(p.t)}">${p.t}</span>
          <span class="badge ${freqCls(p.f)}">${p.f}</span>
          <span class="badge ${p.v?'bv-yes':'bv-chk'}">${p.v?'✓ Verified':'⚠ Check URL'}</span>
        </div>
        <svg class="chev" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="proc-detail">
        <div class="detail-inner">
          <div class="detail-section">
            <span class="dlabel">Portal URL</span>
            ${p.url.startsWith('N/A')?`<span class="dvalue" style="color:var(--light)">${p.url}</span>`:`<a class="portal-link" href="${p.url}" target="_blank" rel="noopener">${p.url}</a><button class="copy-btn" onclick="copy('${p.url}',this);event.stopPropagation()">Copy</button>`}
          </div>
          <div class="detail-section">
            <span class="dlabel">Support Phone</span>
            <span class="dvalue">${p.ph}${p.ph!=='N/A'&&!p.ph.includes('only')&&!p.ph.includes('support.')?`<button class="copy-btn" onclick="copy('${p.ph}',this);event.stopPropagation()">Copy</button>`:''}</span>
          </div>
          <div class="full-row steps-row">
            <div class="row-label">▶ Steps to pull statement</div>
            <div class="row-text">${p.steps}</div>
          </div>
          <div class="full-row nologin-row">
            <div class="row-label">🔓 If merchant has no login</div>
            <div class="row-text">${p.nologin}</div>
          </div>
          <div class="full-row gotcha-row">
            <div class="row-label">⚠ Gotcha / Notes</div>
            <div class="row-text">${p.gotcha}</div>
          </div>
        </div>
      </div>
    </div>`).join('');
}

function toggle(r){
  const card=document.getElementById('pc'+r);
  const wasOpen=card.classList.contains('open');
  if(openCard&&openCard!==card){openCard.classList.remove('open');openCard.querySelector('.proc-detail').style.display='none';}
  if(wasOpen){card.classList.remove('open');card.querySelector('.proc-detail').style.display='none';openCard=null;}
  else{card.classList.add('open');card.querySelector('.proc-detail').style.display='block';openCard=card;card.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

function renderDecoder(rows,id,h1,h2){
  document.getElementById(id).innerHTML=
    `<div class="dg-hdr">${h1}</div><div class="dg-hdr" style="text-align:center">→</div><div class="dg-hdr">${h2}</div>`+
    rows.map((r,i)=>`<div class="dg-cell dg-says ${i%2?'dg-row-alt':''}">${r[0]}</div><div class="dg-cell dg-arrow ${i%2?'dg-row-alt':''}">→</div><div class="dg-cell dg-actual ${i%2?'dg-row-alt':''}">${r[1]} <span style="color:var(--muted);font-weight:400">— ${r[2]}</span></div>`).join('');
}

function renderQuickRef(){
  document.getElementById('qrefGrid').innerHTML=P.map(p=>`
    <div class="qref-card">
      <span class="qref-num">${p.r}</span>
      <div class="qref-body">
        <div class="qref-name">${p.n}</div>
        ${p.url.startsWith('N/A')?'<span style="font-size:11px;color:var(--light)">No portal</span>':`<a class="qref-url" href="${p.url}" target="_blank">${p.url}</a>`}
        <div class="qref-phone">${p.ph}</div>
      </div>
    </div>`).join('');
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const name=tab.dataset.tab;
    ['lookup','decoder','descriptor','quickref'].forEach(id=>document.getElementById('tab-'+id).style.display=id===name?'block':'none');
  });
});

document.querySelectorAll('.pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter=pill.dataset.f;
    renderList();
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('[data-tab="lookup"]').classList.add('active');
    ['lookup','decoder','descriptor','quickref'].forEach(id=>document.getElementById('tab-'+id).style.display=id==='lookup'?'block':'none');
  });
});

document.getElementById('searchInput').addEventListener('input',renderList);

document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==document.getElementById('searchInput')){e.preventDefault();document.getElementById('searchInput').focus();}
  if(e.key==='Escape'){document.getElementById('searchInput').value='';renderList();}
});

renderDecoder(DECODERS,'decoderGrid','Merchant Says','Actual Processor / Portal');
renderDecoder(DESCRIPTORS,'descriptorGrid','Bank Deposit Descriptor Contains','Processor / Portal');
