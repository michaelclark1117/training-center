{a:"If a parts supplier called and said 'want to check if you're being overcharged on parts invoices?' most shop owners say no. Until the supplier pulls up the invoice and shows a 12% markup hiding in the line items that's been running for two years.",s:"\"I get it — I'd say the same thing on a cold call. But your processing statement has line items just like a parts invoice. There are markups on there — interchange bumps, monthly minimums, batch fees — that most shop owners never review. We're not asking you to change anything today. We just want to show you what's on the invoice. Five minutes and you'll know exactly where you stand.\"",r:"Frame the statement as a parts invoice. Auto shops understand line-item audits."},
{a:"A shop owner who doesn't check the alignment after a suspension job isn't disinterested in quality — they just haven't had a reason to look yet. Give them a reason.",s:"\"Most shop owners I talk to aren't interested until I tell them the average auto repair business on their volume range is overpaying somewhere between $200 and $600 a month in fees they never see itemized. I'm not saying that's you. But it might be. And a five-minute statement review is the only way to know.\"",r:"Lead with a dollar range specific to their business type. Specificity creates interest where a generic pitch doesn't."},
{a:"A tech who skips the diagnostic before a repair doesn't know what's wrong yet. You can't know if there's a problem until you run the scan.",s:"\"Saying not interested before we look at the statement is like skipping the diagnostic. You don't know if there's a problem until we run it. We're not selling you anything today — we're just offering to scan the fees. If nothing's off, I'll tell you that. If something is, you'll want to know.\"",r:"Use the diagnostic analogy directly. It's native language for a shop owner and removes sales pressure."}

{a:"A shop that's happy with their oil supplier is still going to notice if the price per quart goes up 20 cents without notice. That's not disloyalty — that's good business.",s:"\"I just want to make sure the happy feeling matches the actual numbers. Processors are good at raising rates in ways that don't show up obviously on the statement. If you're happy AND you're getting a fair deal, that's a win. We just want to confirm the second part.\"",r:"Separate emotional satisfaction from financial accuracy — then offer to verify the math."}

{a:"A shop doesn't replace a part without knowing if it's actually bad. You run the test first. Same principle here — look at the data before making any decision.",s:"\"No good tech replaces a part just because someone said to — you test it first. That's all we're doing. Pull the statement, let us analyze it, and then you decide. If the part's fine, you keep it. If it's not, at least now you know.\"",r:"The 'test before you replace' framing keeps the shop owner in control. They're diagnosing, not committing."},

{a:"The most efficient operators still schedule time for vendor reviews — because not reviewing is just another form of overpaying.",s:"\"What's your lightest day this week? I'll call back then. Five minutes and you'll either have a number worth acting on or confirmation you're already dialed in. Either way you'll know.\"",r:"Ask for the light-day callback. Shows you respect their time structure and removes all pressure from the current moment."}
],
"We're happy":[
{a:"Most service businesses are happy with their payroll software — until their accountant finds a plan they've outgrown that's been running $200 a month over what they should be paying.",s:"\"Your processing volume changes as you grow, and the pricing tier you were set up on may not be the right one for where you are today. Processors don't proactively move you to a better rate. That's something you have to catch — or have someone catch for you. We're offering to be that second set of eyes.\"",r:"Service businesses grow. Pricing that made sense at $10k/month may be wrong at $50k/month. Use growth as the hook."},
{a:"A service provider who's satisfied with their CRM subscription still checks the renewal pricing every year. Being happy doesn't mean you stop verifying the terms.",s:"\"When did you last actually calculate your effective processing rate? Not what your processor told you when you signed up — what you're paying today across all card types. Most service business owners have never run that number. We can show it to you in five minutes.\"",r:"The effective rate question is the opener. Most can't answer it — and not knowing creates the conversation."},
{a:"A happy client still reads the invoice before they pay it. Being satisfied with the relationship doesn't mean you stop verifying the billing.",s:"\"Processors are good at raising rates in ways that don't show up obviously on the monthly statement. If you're happy and the pricing is right, a five-minute review confirms both. If the pricing has drifted — you'll want to know before it runs another year.\"",r:"Separate emotional satisfaction from financial accuracy. Offer to verify the one they haven't checked."}
],
"Not switching":[
{a:"Getting a second quote on a software contract doesn't mean you're leaving your current vendor. It means you're a good operator. Most smart service businesses benchmark their key vendors once a year — not to switch, but to negotiate.",s:"\"I'm not asking you to switch anything. Think of this the same way you'd get a second quote before a software contract renews — you're not committed to leaving, you're just making sure the terms are still competitive. The move only makes sense if the numbers say it does.\"",r:"Service businesses understand vendor benchmarking. Frame the review as standard operational practice."},
{a:"A service provider who stays with a vendor without checking current pricing isn't being loyal — they're just not negotiating. And processors know which accounts never look.",s:"\"Processors track which accounts review their statements and which ones don't. The ones that never look also absorb rate increases without pushback. You don't have to switch anything. But knowing the number puts you in a different category.\"",r:"Frame inaction as a disadvantage. Processors know who's paying attention — and who isn't."},
{a:"A consultant who accepts a client's first offer without benchmarking it isn't being agreeable — they're leaving money on the table. Same logic applies to vendor relationships.",s:"\"Right now you're making the decision to stay without knowing what you're actually paying. Let us put the number in front of you. If staying is the right call, the statement proves it. If not — at least now you're deciding with information instead of assumption.\"",r:"The decision to stay is also a decision. Make sure it's an informed one."}
],
"I use a friend":[
{a:"A service provider who uses a friend for bookkeeping still has a CPA review the returns at year-end. That's not distrust — it's just responsible business practice.",s:"\"Does your friend know what your effective rate is right now, today? Not what they set it up at — what it is today across all card types. Most reps sell the account and move on. Rates drift and nobody calls to tell you when they've gone up. We just want to show you the current number. If it's right, your friend looks great.\"",r:"Ask if the friend knows the current effective rate. Most reps don't actively manage accounts post-setup — that's the gap."},
{a:"If the vendor your friend recommended was quietly overcharging on your monthly subscription, you'd want to know — not to end the friendship, but because it's your money.",s:"\"The interchange fees Visa and Mastercard set are the same for everyone regardless of who sold the account. Where processors differ is what they add on top. Your friend may have set you up clean. But what's sitting on top of the interchange today — after whatever has shifted — that's what we want to look at. If it's right, I'll tell you that.\"",r:"Separate the friend from the rate structure underneath. Interchange is universal — the markup on top is where it varies."},
{a:"A service provider who refers clients to a trusted colleague still expects that colleague to deliver the right outcome. Trust is earned by results, not just by the relationship.",s:"\"Even with a trusted contact, smart operators verify the numbers at least once a year. We're not here to replace that relationship — we're offering one independent look at the statement. If everything checks out, you've confirmed your friend is doing right by you. That's actually the best outcome of this call.\"",r:"Frame independent verification as validation of the friend's work, not a challenge to it."}
]
}
};

var curInd="auto",curObj=0,curVar=0;

function paint(){
  var ind=inds.find(function(i){return i.id===curInd;});
  var key=objs[curObj];
  var card=D[curInd][key][curVar];
  document.getElementById("ind-row").innerHTML=inds.map(function(i){
    var a=i.id===curInd;
    return '<div class="itab'+(a?' active':'')+'" onclick="selInd(\''+i.id+'\')" style="'+(a?'background:'+i.color+';color:#fff;border-color:'+i.color:'')+'"><i class="ti '+i.icon+'"></i>'+i.label+'</div>';
  }).join("");
  document.getElementById("obj-row").innerHTML=objs.map(function(o,i){
    return '<div class="otab'+(i===curObj?' active':'')+'" onclick="selObj('+i+')">&ldquo;'+o+'&rdquo;</div>';
  }).join("");
  document.getElementById("var-row").innerHTML=[1,2,3].map(function(n,i){
    return '<div class="vtab'+(i===curVar?' active':'')+'" onclick="selVar('+i+')">Analogy '+n+'</div>';
  }).join("");
  document.getElementById("crumb").textContent=ind.label+' · "'+key+'" · Analogy '+(curVar+1)+' of 3';
  document.getElementById("card").innerHTML=
    '<div class="card"><div class="card-top"><div class="obj-lbl">Objection</div><div class="obj-txt">&ldquo;'+key+'&rdquo;</div></div>'+
    '<div class="card-body">'+
    '<div class="slabel">The analogy</div><div class="abox">'+card.a+'</div>'+
    '<div class="slabel">Script</div><div class="sbox">'+card.s+'</div>'+
    '<div class="rule"><i class="ti ti-arrow-right"></i><span>'+card.r+'</span></div>'+
    '</div></div>';
}
function selInd(id){curInd=id;curObj=0;curVar=0;paint();}
function selObj(i){curObj=i;curVar=0;paint();}
function selVar(i){curVar=i;paint();}
paint();
</script>

</html>
